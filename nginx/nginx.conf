# nginx/nginx.conf
# Production reverse proxy for Nimali Call Agent
# Handles SSL termination, rate limiting, and upstream load balancing.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;   # handles 1024 simultaneous connections per worker
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;   # allow large audio uploads from Twilio

    # ── Rate limiting (protect against Twilio webhook floods) ────────────────
    # 30 requests/second per IP — well above what a single call needs
    limit_req_zone $binary_remote_addr zone=twilio:10m rate=30r/s;

    # ── Upstream (app service in docker-compose) ──────────────────────────────
    upstream nimali_app {
        server app:8000;
        keepalive 32;   # reuse connections to Gunicorn workers
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS — place your cert and key files in nginx/certs/
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Twilio webhook endpoints ──────────────────────────────────────────
        location ~ ^/(voice|gather|status)$ {
            limit_req zone=twilio burst=20 nodelay;
            proxy_pass         http://nimali_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # allow time for STT + LLM + TTS
            proxy_send_timeout 30s;
        }

        # ── Static MP3 audio — served directly by Nginx (fast) ───────────────
        location /static/ {
            alias /app/static/;
            add_header Cache-Control "public, max-age=300";
            expires 5m;
        }

        # ── Dashboard & API ───────────────────────────────────────────────────
        location / {
            proxy_pass         http://nimali_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
